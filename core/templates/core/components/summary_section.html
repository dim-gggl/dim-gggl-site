{% load static %}
{% load localization_tags %}
<section class="mx-auto max-w-6xl px-4 py-10" aria-labelledby="summary-title">
  <h2 id="summary-title" class="mb-6 text-2xl font-bold">{% t "summary.title" %}</h2>
  <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
    <a href="#projects" class="group rounded-xl border-2 border-transparent bg-(--color-bg-secondary) py-6 px-auto transition hover:-translate-y-1 hover:border-(--color-accent-primary) hover:shadow-xl">
      <div class="flex flex-col items-center justify-center w-full">
        <img src="{% static 'images/telescope.png' %}" alt="{% t 'summary.projects' %}" class="w-10 h-10">
        <div class="mt-3 text-lg font-semibold">{% t "summary.projects" %}</div>
        <p class="text-sm text-(--color-text-secondary)">{% t "summary.projects_count" count=total_projects %}</p>
      </div>
    </a>
    <a href="#skills" class="group rounded-xl border-2 border-transparent bg-(--color-bg-secondary) py-6 px-auto transition hover:-translate-y-1 hover:border-(--color-accent-primary) hover:shadow-xl">
      <div class="flex flex-col items-center justify-center w-full">
        <img src="{% static 'images/skills.png' %}" alt="{% t 'summary.skills' %}" class="w-10 h-10">
        <div class="mt-3 text-lg font-semibold">{% t "summary.skills" %}</div>
        <p class="text-sm text-(--color-text-secondary)">{% t "summary.skills_count" count=technologies_count %}</p>
      </div>
    </a>
    <a href="{% url 'core:about' %}" class="group rounded-xl border-2 border-transparent bg-(--color-bg-secondary) py-6 px-auto transition hover:-translate-y-1 hover:border-(--color-accent-primary) hover:shadow-xl">
      <div class="flex flex-col items-center justify-center w-full">
        <img src="{% static 'images/about.png' %}" alt="{% t 'summary.about' %}" class="w-10 h-10">
        <div class="mt-3 text-lg font-semibold">{% t "summary.about" %}</div>
        <p class="text-sm text-(--color-text-secondary)">{% t "summary.about_description" %}</p>
      </div>
    </a>
  </div>
</section>
